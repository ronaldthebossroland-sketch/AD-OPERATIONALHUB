<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f9fafb" />
    <link rel="privacy-policy" href="/privacy" />
    <link rel="terms-of-service" href="/terms" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Executive AI" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Executive Virtual AI Assistant</title>
    <style>
      html,
      body {
        margin: 0;
        min-width: 0;
        min-height: 100%;
        background:
          linear-gradient(135deg, #f9fafb 0 60%, #e5e7eb 60% 90%, #eff6ff 90% 100%),
          #f9fafb;
      }

      .initial-splash {
        position: relative;
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(135deg, #f9fafb 0 60%, #e5e7eb 60% 90%, #eff6ff 90% 100%),
          #f9fafb;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .initial-splash::before {
        position: absolute;
        inset: -22%;
        content: "";
        background: transparent;
      }

      .initial-splash__stage {
        position: relative;
        display: grid;
        width: min(92vw, 520px);
        justify-items: center;
        gap: 22px;
        padding: 32px 20px;
      }

      .initial-splash__logo-wrap {
        position: relative;
        display: grid;
        height: clamp(164px, 28vw, 228px);
        width: clamp(164px, 28vw, 228px);
        place-items: center;
      }

      .initial-splash__logo-wrap::before,
      .initial-splash__logo-wrap::after {
        position: absolute;
        border-radius: 999px;
        content: "";
      }

      .initial-splash__logo-wrap::before {
        inset: 14px;
        border: 1px solid rgba(209, 213, 219, 0.9);
        border-top-color: rgba(37, 99, 235, 0.48);
        animation: initial-splash-spin 8s linear infinite;
      }

      .initial-splash__logo-wrap::after {
        inset: 34px;
        border: 1px solid rgba(209, 213, 219, 0.72);
        border-right-color: rgba(37, 99, 235, 0.38);
        animation: initial-splash-spin 6.5s linear infinite reverse;
      }

      .initial-splash img {
        position: relative;
        height: clamp(104px, 18vw, 148px);
        width: clamp(104px, 18vw, 148px);
        border-radius: 32px;
        filter:
          drop-shadow(0 18px 28px rgba(17, 24, 39, 0.1));
        animation: initial-splash-pulse 2.6s ease-in-out infinite;
      }

      .initial-splash h1 {
        margin: 0;
        max-width: 12em;
        color: #111827;
        font-size: clamp(1.72rem, 5vw, 3rem);
        font-weight: 950;
        line-height: 1.04;
      }

      .initial-splash p {
        margin: 0;
        color: #6b7280;
        font-size: clamp(0.95rem, 2.7vw, 1.08rem);
        font-weight: 700;
        line-height: 1.6;
      }

      .initial-legal-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
        color: #2563eb;
        font-size: 0.8rem;
        font-weight: 800;
      }

      .initial-legal-links a {
        color: inherit;
      }

      @keyframes initial-splash-sheen {
        0%,
        100% {
          transform: translate3d(-2%, -1%, 0) scale(1);
        }

        50% {
          transform: translate3d(2%, 1%, 0) scale(1.04);
        }
      }

      @keyframes initial-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes initial-splash-pulse {
        0%,
        100% {
          transform: translateY(0) scale(0.98);
        }

        50% {
          transform: translateY(-4px) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .initial-splash::before,
        .initial-splash__logo-wrap::before,
        .initial-splash__logo-wrap::after,
        .initial-splash img {
          animation: none;
        }
      }
    </style>
    <script>
      (() => {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        navigator.serviceWorker
          .getRegistrations()
          .then((registrations) =>
            Promise.all(registrations.map((registration) => registration.unregister()))
          )
          .then(() => {
            if ("caches" in window) {
              return caches
                .keys()
                .then((keys) => Promise.all(keys.map((key) => caches.delete(key))));
            }

            return null;
          })
          .then(() => {
            if (
              navigator.serviceWorker.controller &&
              !sessionStorage.getItem("adHubServiceWorkerCleaned")
            ) {
              sessionStorage.setItem("adHubServiceWorkerCleaned", "true");
              window.location.reload();
            }
          })
          .catch(() => {});
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-splash" role="status" aria-live="polite">
        <div class="initial-splash__stage">
          <div class="initial-splash__logo-wrap">
            <img src="/logo-mark.png" alt="" aria-hidden="true" />
          </div>
          <h1>Executive Virtual AI Assistant</h1>
          <p>Preparing your executive workspace</p>
          <nav class="initial-legal-links" aria-label="Legal links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms of Service</a>
          </nav>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
